name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint git-wt
        run: shellcheck bin/git-wt

      - name: Lint install.sh
        run: shellcheck install.sh

  release:
    name: Create Release
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: tag
        run: |
          [[ "$GITHUB_REF" == refs/tags/v* ]] || { echo "::error::Not a tag ref: $GITHUB_REF"; exit 1; }
          echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          mkdir -p dist
          tar czf "dist/simple-git-worktree-${{ steps.tag.outputs.version }}.tar.gz" \
            bin/git-wt install.sh install.ps1 README.md LICENSE

      - name: Create zip
        run: |
          mkdir -p dist
          zip "dist/simple-git-worktree-${{ steps.tag.outputs.version }}.zip" \
            bin/git-wt install.sh install.ps1 README.md LICENSE

      - name: Compute SHA256
        id: sha
        run: |
          tarball="dist/simple-git-worktree-${{ steps.tag.outputs.version }}.tar.gz"
          sha=$(sha256sum "$tarball" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/simple-git-worktree-${{ steps.tag.outputs.version }}.tar.gz
            dist/simple-git-worktree-${{ steps.tag.outputs.version }}.zip

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: tag
        run: echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of tarball
        id: sha
        run: |
          url="https://github.com/silasvasconcelos/simple-git-worktreee/archive/refs/tags/${{ steps.tag.outputs.version }}.tar.gz"
          sha=$(curl -sL "$url" | sha256sum | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: silasvasconcelos/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/simple-git-worktree.rb <<'FORMULA'
          class SimpleGitWorktree < Formula
            desc "Simple git worktree manager"
            homepage "https://github.com/silasvasconcelos/simple-git-worktreee"
            url "https://github.com/silasvasconcelos/simple-git-worktreee/archive/refs/tags/${{ steps.tag.outputs.version }}.tar.gz"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on "git"

            def install
              bin.install "bin/git-wt"
            end

            test do
              assert_match "git-wt", shell_output("#{bin}/git-wt version")
            end
          end
          FORMULA

      - name: Push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/simple-git-worktree.rb
          git commit -m "simple-git-worktree ${{ steps.tag.outputs.version }}"
          git push

  scoop:
    name: Update Scoop manifest
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of zip
        id: sha
        run: |
          url="https://github.com/silasvasconcelos/simple-git-worktreee/releases/download/v${{ steps.tag.outputs.version }}/simple-git-worktree-v${{ steps.tag.outputs.version }}.zip"
          sha=$(curl -sL "$url" | sha256sum | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout Scoop bucket
        uses: actions/checkout@v4
        with:
          repository: silasvasconcelos/scoop-bucket
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          cat > scoop-bucket/simple-git-worktree.json <<EOF
          {
            "version": "${{ steps.tag.outputs.version }}",
            "description": "Simple git worktree manager",
            "homepage": "https://github.com/silasvasconcelos/simple-git-worktreee",
            "license": "MIT",
            "url": "https://github.com/silasvasconcelos/simple-git-worktreee/releases/download/v${{ steps.tag.outputs.version }}/simple-git-worktree-v${{ steps.tag.outputs.version }}.zip",
            "hash": "${{ steps.sha.outputs.sha256 }}",
            "bin": "bin/git-wt",
            "post_install": "git config --global alias.wt '!git-wt'"
          }
          EOF

      - name: Push manifest
        working-directory: scoop-bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add simple-git-worktree.json
          git commit -m "simple-git-worktree ${{ steps.tag.outputs.version }}"
          git push
